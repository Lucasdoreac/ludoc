    \ timeout=timeout)\n        LIMIT = 8000\n        stdout = res.stdout\n      \
    \  stderr = res.stderr\n        truncated = False\n        if len(stdout) > LIMIT:\n\
    \            stdout = stdout[:3000] + f\"\\n...[truncated {len(stdout)-LIMIT}\
