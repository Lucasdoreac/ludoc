  cleaner.py: "\"\"\"Filtro de contexto: seleciona skills relevantes para o prompt\
    \ do usu\xC3\xA1rio.\"\"\"\nimport re\n\n# Palavras-chave por dom\xC3\xADnio \xE2\
    \u20AC\u201D mapeiam termos do usu\xC3\xA1rio para skills relevantes\n_DOMAIN_MAP\
    \ = {\n    \"web_fetch\":    [\"fetch\", \"url\", \"http\", \"download\", \"p\xC3\
    \xA1gina\", \"site\", \"curl\"],\n    \"web_search\":   [\"search\", \"busca\"\
    , \"pesquisa\", \"google\", \"duckduckgo\", \"encontre\"],\n    \"execute_shell\"\
    :[\"run\", \"execute\", \"shell\", \"bash\", \"comando\", \"script\", \"rode\"\
    ],\n    \"write_file\":   [\"write\", \"create\", \"crie\", \"escreva\", \"arquivo\"\
    , \"salve\", \"gere\"],\n    \"read_file\":    [\"read\", \"leia\", \"abra\",\
    \ \"veja\", \"conte\xC3\xBAdo\", \"show\", \"cat\"],\n    \"list_dir\":     [\"\
    list\", \"liste\", \"diret\xC3\xB3rio\", \"pasta\", \"files\", \"ls\"],\n    \"\
    grep\":         [\"grep\", \"busque\", \"encontre\", \"pattern\", \"regex\", \"\
    ocorr\xC3\xAAncia\"],\n    \"glob\":         [\"glob\", \"extens\xC3\xA3o\", \"\
    *.py\", \"arquivos\", \"pattern\"],\n    \"validate_code\":[\"valide\", \"validate\"\
    , \"syntax\", \"linting\", \"check\", \"c\xC3\xB3digo\"],\n    \"git\":      \
    \    [\"git\", \"commit\", \"diff\", \"status\", \"branch\", \"log\"],\n    \"\
    memory_set\":   [\"lembre\", \"salve\", \"guarde\", \"memorize\", \"armazene\"\
    ],\n    \"memory_get\":   [\"lembre\", \"recupere\", \"recall\", \"mem\xC3\xB3\
    ria\", \"o que sei\"],\n    \"todo_write\":   [\"todo\", \"tarefa\", \"plano\"\
    , \"passo\", \"step\", \"task\"],\n    \"analyze_dependency_graph\": [\"grafo\"\
    , \"depend\xC3\xAAncia\", \"graph\", \"an\xC3\xA1lise\"],\n    \"get_patient\"\
    :  [\"paciente\", \"patient\", \"registro\", \"record\"],\n    \"list_patients\"\
    :[\"pacientes\", \"patients\", \"lista\", \"todos\"],\n}\n\ndef select(prompt:\
    \ str, catalog: dict, max_skills: int = 6) -> list:\n    \"\"\"Retorna as skills\
    \ mais relevantes para o prompt dado.\"\"\"\n    prompt_lower = prompt.lower()\n\
    \    words = set(re.findall(r'\\w+', prompt_lower))\n    scores = {}\n    for\
    \ name in catalog:\n        score = 0\n        keywords = _DOMAIN_MAP.get(name,\
    \ [])\n        for kw in keywords:\n            if kw in prompt_lower:\n     \
    \           score += 2\n        # match parcial por palavras\n        desc = catalog[name].get(\"\
    description\", \"\").lower()\n        for w in words:\n            if len(w) >\
    \ 3 and w in desc:\n                score += 1\n        if score > 0:\n      \
    \      scores[name] = score\n    # sempre inclui final_answer implicitamente\n\
    \    ranked = sorted(scores, key=lambda k: scores[k], reverse=True)[:max_skills]\n\
    \    # se nenhuma skill for selecionada, retorna todas (fallback)\n    if not\
    \ ranked:\n        ranked = list(catalog.keys())[:max_skills]\n    return [catalog[n]\
    \ for n in ranked]\n\ndef format_for_llm(skills: list) -> str:\n    lines = []\n\
    \    for s in skills:\n        params = \", \".join(s.get(\"params\", [])) or\
    \ \"none\"\n        lines.append(f\"- {s['name']}({params}): {s['description']}\"\
    )\n    return \"\\n\".join(lines)\n"
  llm.py: "\"\"\"Cliente Ollama via urllib. Zero depend\xC3\xAAncias externas.\"\"\
    \"\nimport json, urllib.request, urllib.error, os\n\nOLLAMA_HOST = os.environ.get(\"\
    OLLAMA_HOST\", \"http://host.docker.internal:11434\")\nDEFAULT_MODEL = os.environ.get(\"\
    OLLAMA_MODEL\", \"qwen2.5:0.5b\")\nCONTEXT_CHAR_LIMIT = int(os.environ.get(\"\
    CONTEXT_CHAR_LIMIT\", \"12000\"))  # ~3k tokens\n\ndef trim_history(messages:\
    \ list, limit: int = CONTEXT_CHAR_LIMIT) -> list:\n    \"\"\"Mant\xC3\xA9m o primeiro\
    \ user message + os N mais recentes que cabem no limite.\"\"\"\n    if not messages:\n\
    \        return messages\n    total = sum(len(m.get(\"content\",\"\")) for m in\
    \ messages)\n    if total <= limit:\n        return messages\n    # sempre preserva\
    \ o primeiro (prompt original) e vai removendo pares do meio\n    first = messages[:1]\n\
    \    rest  = messages[1:]\n    while rest and sum(len(m.get(\"content\",\"\"))\
    \ for m in first + rest) > limit:\n        # remove o par mais antigo (assistant\
    \ + observation)\n        rest = rest[2:] if len(rest) >= 2 else rest[1:]\n  \
    \  return first + rest\n\nMAESTRO_SYSTEM = \"\"\"You are an autonomous agent.\
    \ You must respond ONLY with a JSON object.\n\nTo call a tool:\n{\"action\": \"\
    SKILL_NAME\", \"params\": {\"param1\": \"value1\"}}\n\nTo return a final answer:\n\
    {\"action\": \"final_answer\", \"params\": {\"text\": \"your answer here\"}}\n\
    \nRules:\n- Never explain. Only output valid JSON.\n- Use only the skills listed\
    \ in the context.\n- If the task is complete, use final_answer.\n- Max 10 iterations\
    \ per task.\"\"\"\n\ndef call(messages: list, model: str = DEFAULT_MODEL, tools_context:\
    \ str = \"\") -> dict:\n    system = MAESTRO_SYSTEM\n    if tools_context:\n \
    \       system += f\"\\n\\nAvailable skills:\\n{tools_context}\"\n    payload\
    \ = {\n        \"model\": model,\n        \"messages\": [{\"role\": \"system\"\
    , \"content\": system}] + messages,\n        \"stream\": False,\n        \"format\"\
    : \"json\",\n        \"options\": {\"temperature\": 0.1}\n    }\n    try:\n  \
    \      req = urllib.request.Request(\n            f\"{OLLAMA_HOST}/api/chat\"\
    ,\n            data=json.dumps(payload).encode(),\n            headers={\"Content-Type\"\
    : \"application/json\"},\n            method=\"POST\"\n        )\n        with\
    \ urllib.request.urlopen(req, timeout=120) as r:\n            resp = json.loads(r.read())\n\
    \            content = resp[\"message\"][\"content\"]\n            return json.loads(content)\n\
    \    except urllib.error.URLError as e:\n        return {\"error\": f\"ollama\
    \ unreachable: {e.reason}\", \"action\": \"final_answer\",\n                \"\
    params\": {\"text\": f\"LLM unavailable: {e.reason}\"}}\n    except (json.JSONDecodeError,\
    \ KeyError) as e:\n        return {\"error\": f\"parse error: {e}\", \"action\"\
    : \"final_answer\",\n                \"params\": {\"text\": \"LLM returned invalid\
    \ JSON\"}}\n\ndef available() -> bool:\n    try:\n        urllib.request.urlopen(f\"\
    {OLLAMA_HOST}/api/tags\", timeout=2)\n        return True\n    except:\n     \
    \   return False\n"
