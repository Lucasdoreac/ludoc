    \     new_content = content.replace(old_string, new_string, 1)\n        with open(safe,\
    \ \"w\") as f:\n            f.write(new_content)\n        return 200, {\"status\"\
    : \"ok\", \"path\": safe, \"replacements\": 1}\n    except Exception as e:\n \
    \       return 500, {\"error\": str(e)}\n\n_INTERNAL = {\"execute_shell\": _exec_shell,\
    \ \"write_file\": _write_file, \"fs_edit\": _fs_edit}\n\ndef _validate_code(params):\n\
    \    code = params.get(\"code\", \"\")\n    if not code:\n        return 400,\
