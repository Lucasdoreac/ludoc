    \ subprocess.TimeoutExpired:\n        return 200, {\"stdout\": \"\", \"stderr\"\
    : f\"timeout after {timeout}s\", \"code\": -1, \"cwd\": _CWD[0]}\n\ndef _write_file(params):\n\
    \    filename = params.get(\"filename\", \"\")\n    content  = params.get(\"content\"\
