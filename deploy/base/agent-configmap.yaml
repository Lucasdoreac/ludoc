    \    _catalog = {s[\"name\"]: s for s in json.load(f)}\n\ndef list_skills():\n\
    \    return [{\"name\": s[\"name\"], \"description\": s[\"description\"], \"params\"\
    : s[\"params\"]}\n            for s in _catalog.values()]\n\n# --- handlers locais\
