    \ target))\n        if os.path.isdir(new_cwd):\n            _CWD[0] = new_cwd\n\
    \            return 200, {\"stdout\": \"\", \"stderr\": \"\", \"code\": 0, \"\
    cwd\": _CWD[0]}\n        return 200, {\"stdout\": \"\", \"stderr\": f\"cd: {target}:\
    \ No such directory\", \"code\": 1}\n    try:\n        res = subprocess.run(cmd,\
