apiVersion: v1
kind: ConfigMap
metadata:
  name: obridge-config
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: listener_0
        address:
          socket_address: {address: 0.0.0.0, port_value: 15001}
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: egress_http
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                  log_format:
                    text_format: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_SENT%b upstream=%UPSTREAM_HOST%\n"
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  request_headers_to_add:
                  - header:
                      key: X-Delegation-Chain
                      value: "ludoc-orchestrator"
                    keep_empty_value: false
                  routes:
                  - match: {prefix: "/"}
                    route: {cluster: patient_cluster}
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: patient_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        load_assignment:
          cluster_name: patient_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: patient-records
                    port_value: 80
