apiVersion: apps/v1
kind: Deployment
metadata:
  name: ludoc-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ludoc-agent
  template:
    metadata:
      labels:
        app: ludoc-agent
      annotations:
        kubectl.kubernetes.io/default-container: "python"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
      - name: init-deps
        image: python:3.13-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install --no-cache-dir --target=/tmp/workspace/deps python-docx python-pptx openpyxl lxml mcp[sse] uvicorn starlette"]
        volumeMounts:
        - name: workspace
          mountPath: /tmp/workspace
      containers:
      - name: ludoc-agent
        image: python:3.13-slim
        command: ["python3", "-u", "/app/src/agent/server.py"]
        env:
        - name: PYTHONPATH
          value: /tmp/workspace/deps
        ports:
        - containerPort: 8080
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        volumeMounts:
        - name: ludoc-config-volume
          mountPath: /app/src/agent
        - name: workspace
          mountPath: /tmp/workspace
      volumes:
      - name: ludoc-config-volume
        configMap:
          name: ludoc-config
      - name: workspace
        persistentVolumeClaim:
          claimName: ludoc-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ludoc-agent
spec:
  type: NodePort
  selector:
    app: ludoc-agent
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    nodePort: 30080
