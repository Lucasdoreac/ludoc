apiVersion: v1
kind: ConfigMap
metadata:
  name: ludoc-config
data:
  cleaner.py: |
    """Filtro de contexto: seleciona skills relevantes para o prompt do usuário."""
    import re

    # Palavras-chave por domínio — mapeiam termos do usuário para skills relevantes
    _DOMAIN_MAP = {
        "web_fetch":    ["fetch", "url", "http", "download", "página", "site", "curl"],
        "web_search":   ["search", "busca", "pesquisa", "google", "duckduckgo", "encontre"],
        "execute_shell":["run", "execute", "shell", "bash", "comando", "script", "rode", "ls", "cat", "grep", "find"],
        "write_file":   ["write", "create", "crie", "escreva", "arquivo", "salve", "gere"],
        "fs_edit":      ["edit", "change", "replace", "substitua", "altere", "modifique"],
        "validate_code":["valide", "validate", "syntax", "linting", "check", "código"],
        "analyze_dependency_graph": ["grafo", "dependência", "graph", "análise"],
        "get_patient":  ["paciente", "patient", "registro", "record"],
        "list_patients":["pacientes", "patients", "lista", "todos"],
        "distill_experience": ["distill", "sumário", "lição", "aprendizado", "experiência"],
    }

    def select(prompt: str, catalog: dict, max_skills: int = 6) -> list:
        """Retorna as skills mais relevantes para o prompt dado."""
        prompt_lower = prompt.lower()
        words = set(re.findall(r'\w+', prompt_lower))
        scores = {}
        for name in catalog:
            score = 0
            keywords = _DOMAIN_MAP.get(name, [])
            for kw in keywords:
                if kw in prompt_lower:
                    score += 2
            # match parcial por palavras
            desc = catalog[name].get("description", "").lower()
            for w in words:
                if len(w) > 3 and w in desc:
                    score += 1
            if score > 0:
                scores[name] = score
        # sempre inclui final_answer implicitamente
        ranked = sorted(scores, key=lambda k: scores[k], reverse=True)[:max_skills]
        # se nenhuma skill for selecionada, retorna todas (fallback)
        if not ranked:
            ranked = list(catalog.keys())[:max_skills]
        return [catalog[n] for n in ranked]

    def format_for_llm(skills: list) -> str:
        lines = []
        for s in skills:
            params = ", ".join(s.get("params", [])) or "none"
            lines.append(f"- {s['name']}({params}): {s['description']}")
        return "\n".join(lines)

  llm.py: |
    """Cliente Ollama via urllib. Zero dependências externas."""
    import json, urllib.request, urllib.error, os

    OLLAMA_HOST = os.environ.get("OLLAMA_HOST", "http://host.docker.internal:11434")
    DEFAULT_MODEL = os.environ.get("OLLAMA_MODEL", "qwen2.5:0.5b")
    CONTEXT_CHAR_LIMIT = int(os.environ.get("CONTEXT_CHAR_LIMIT", "12000"))  # ~3k tokens

    def trim_history(messages: list, limit: int = CONTEXT_CHAR_LIMIT) -> list:
        """Mantém o primeiro user message + os N mais recentes que cabem no limite."""
        if not messages:
            return messages
        total = sum(len(m.get("content","")) for m in messages)
        if total <= limit:
            return messages
        # sempre preserva o primeiro (prompt original) e vai removendo pares do meio
        first = messages[:1]
        rest  = messages[1:]
        while rest and sum(len(m.get("content","")) for m in first + rest) > limit:
            # remove o par mais antigo (assistant + observation)
            rest = rest[2:] if len(rest) >= 2 else rest[1:]
        return first + rest

    MAESTRO_SYSTEM = """You are a LAZY senior developer. YOU HATE WRITING CODE AND USING TOOLS.
    Respond ONLY with a JSON object.

    PONYTAIL PRINCIPLES:
    1. Don't do it if not absolutely necessary.
    2. Use CLI commands (ls, cat, grep, find) via `execute_shell` to explore files.
    3. BEWARE: `read_file`, `list_dir`, `grep` and `glob` tools have been REMOVED. Use shell.
    4. Respond in JSON format only.

    If the user asks for code, DON'T EXECUTE IT. Just return it in a final_answer.

    JSON format:
    For tools: {"action": "SKILL_NAME", "params": {"param1": "value1"}}
    For final answer: {"action": "final_answer", "params": {"text": "YOUR_ANSWER_HERE"}}

    RULES:
    - NO TALKING. NO EXPLANATIONS.
    - DO NOT REPEAT TOOLS.
    - SHIP MINIMAL CODE."""

    def call(messages: list, model: str = DEFAULT_MODEL, tools_context: str = "") -> dict:
        system = MAESTRO_SYSTEM
        if tools_context:
            system += f"\n\nAvailable skills:\n{tools_context}"
        payload = {
            "model": model,
            "messages": [{"role": "system", "content": system}] + messages,
            "stream": False,
            "format": "json",
            "options": {"temperature": 0.1}
        }
        try:
            req = urllib.request.Request(
                f"{OLLAMA_HOST}/api/chat",
                data=json.dumps(payload).encode(),
                headers={"Content-Type": "application/json"},
                method="POST"
            )
            with urllib.request.urlopen(req, timeout=120) as r:
                resp = json.loads(r.read())
                content = resp["message"]["content"]
                return json.loads(content)
        except urllib.error.URLError as e:
            return {"error": f"ollama unreachable: {e.reason}", "action": "final_answer",
                    "params": {"text": f"LLM unavailable: {e.reason}"}}
        except (json.JSONDecodeError, KeyError) as e:
            return {"error": f"parse error: {e}", "action": "final_answer",
                    "params": {"text": "LLM returned invalid JSON"}}

    def available() -> bool:
        try:
            urllib.request.urlopen(f"{OLLAMA_HOST}/api/tags", timeout=2)
            return True
        except:
            return False

  main.py: |
    import json, urllib.request, urllib.error, http.server, subprocess, os

    PROXY      = "http://localhost:15001"
    WORKSPACE  = "/tmp/workspace"
    os.makedirs(WORKSPACE, exist_ok=True)
    # --- carrega catálogo de skills dinamicamente ---
    SKILLS_DIR = os.path.join(os.path.dirname(__file__), "skills")
    _catalog = {}

    def _load_skills():
        global _catalog
        _catalog = {}
        if not os.path.exists(SKILLS_DIR):
            return
        import re
        for root, dirs, files in os.walk(SKILLS_DIR):
            if "skill.md" in files:
                path = os.path.join(root, "skill.md")
                try:
                    with open(path, "r", encoding="utf-8") as f:
                        content = f.read()
                    # Extrai YAML Front Matter
                    match = re.search(r"^---\s*\n(.*?)\n---\s*\n", content, re.DOTALL)
                    if match:
                        meta = {}
                        for line in match.group(1).split("\n"):
                            if ":" in line:
                                k, v = line.split(":", 1)
                                k = k.strip()
                                v = v.strip()
                                if v.startswith("[") and v.endswith("]"):
                                    v = [x.strip().strip("'").strip('"') for x in v[1:-1].split(",") if x.strip()]
                                meta[k] = v
                        if "name" in meta:
                            # Adiciona o conteúdo do markdown como system_instruction
                            meta["system_instruction"] = content[match.end():].strip()
                            _catalog[meta["name"]] = meta
                except Exception as e:
                    print(f"Erro ao carregar skill em {path}: {e}")

    _load_skills()

    def list_skills():
        return [{"name": s["name"], "description": s["description"], "params": s["params"]}
                for s in _catalog.values()]

    # --- handlers locais (internal_exec) ---
    # CWD persistente entre chamadas de execute_shell
    _CWD = [WORKSPACE]

    def _exec_shell(params):
        cmd      = params.get("command", "")
        timeout  = int(params.get("timeout", 30))
        approved = params.get("approved", False)
        
        if not cmd:
            return 400, {"error": "command required"}
            
        # Blacklist HITL
        blacklist = ["rm", "push", "kill", "wget", "curl", "apt", "sh", "bash"]
        import re
        if not approved and any(re.search(rf"\b{term}\b", cmd) for term in blacklist):
            return 200, {"error": "COMANDO BLOQUEADO: Risco de segurança. Requer HITL (Aprovação Humana) para execução"}

        # suporte a cd — atualiza CWD sem spawnar novo shell
        stripped = cmd.strip()
        if stripped.startswith("cd "):
            target = stripped[3:].strip()
            new_cwd = target if os.path.isabs(target) else os.path.normpath(os.path.join(_CWD[0], target))
            if os.path.isdir(new_cwd):
                _CWD[0] = new_cwd
                return 200, {"stdout": "", "stderr": "", "code": 0, "cwd": _CWD[0]}
            return 200, {"stdout": "", "stderr": f"cd: {target}: No such directory", "code": 1}
        try:
            res = subprocess.run(cmd, shell=True, capture_output=True, text=True,
                                 cwd=_CWD[0], timeout=timeout)
            LIMIT = 8000
            stdout = res.stdout
            stderr = res.stderr
            truncated = False
            if len(stdout) > LIMIT:
                stdout = stdout[:3000] + f"\n...[truncated {len(stdout)-LIMIT} chars]...\n" + stdout[-1000:]
                truncated = True
            return 200, {"stdout": stdout, "stderr": stderr[:2000], "code": res.returncode,
                         "cwd": _CWD[0], "truncated": truncated}
        except subprocess.TimeoutExpired:
            return 200, {"stdout": "", "stderr": f"timeout after {timeout}s", "code": -1, "cwd": _CWD[0]}

    def _write_file(params):
        filename = params.get("filename", "")
        content  = params.get("content", "")
        if not filename:
            return 400, {"error": "filename required"}
        safe = os.path.normpath(os.path.join(WORKSPACE, filename))
        if not safe.startswith(WORKSPACE):
            return 403, {"error": "path traversal denied"}
        parent = os.path.dirname(safe)
        if parent:
            os.makedirs(parent, exist_ok=True)
        with open(safe, "w") as f:
            f.write(content)
        return 200, {"status": "ok", "path": safe}

    def _fs_edit(params):
        file_path  = params.get("file_path", "")
        old_string = params.get("old_string", "")
        new_string = params.get("new_string", "")
        if not file_path or old_string == "":
            return 400, {"error": "file_path and old_string required"}
        full = file_path if os.path.isabs(file_path) else os.path.join(_CWD[0], file_path)
        safe = os.path.normpath(full)
        try:
            with open(safe, "r", errors="replace") as f:
                content = f.read()
            count = content.count(old_string)
            if count == 0:
                return 422, {"error": "old_string not found — read the file first and verify exact whitespace/indentation"}
            if count > 1:
                return 422, {"error": f"old_string matches {count} locations — expand context to make it unique"}
            new_content = content.replace(old_string, new_string, 1)
            with open(safe, "w") as f:
                f.write(new_content)
            return 200, {"status": "ok", "path": safe, "replacements": 1}
        except Exception as e:
            return 500, {"error": str(e)}

    def _distill_experience(params):
        task = params.get("task", "")
        solution = params.get("solution", "")
        if not task or not solution:
            return 400, {"error": "task and solution required"}
        
        line = f"Tarefa: {task} | Solução: {solution}\n"
        path = "/tmp/workspace/episodes.md"
        try:
            with open(path, "a", encoding="utf-8") as f:
                f.write(line)
            return 200, {"status": "ok", "message": "Episódio registrado"}
        except Exception as e:
            return 500, {"error": str(e)}

    _INTERNAL = {"execute_shell": _exec_shell, "write_file": _write_file, "fs_edit": _fs_edit, "distill_experience": _distill_experience}

    def _validate_code(params):
        code = params.get("code", "")
        if not code:
            return 400, {"error": "code required"}
        try:
            import ast
            ast.parse(code)
        except SyntaxError as e:
            return 200, {"valid": False, "error": f"SyntaxError: {e}"}
        # ruff se disponível
        tmp = os.path.join(WORKSPACE, "_validate_tmp.py")
        with open(tmp, "w") as f:
            f.write(code)
        try:
            res = subprocess.run(["ruff", "check", "--select=E,F", tmp],
                                 capture_output=True, text=True)
            os.unlink(tmp)
            if res.returncode != 0:
                return 200, {"valid": False, "error": res.stdout.strip()}
        except FileNotFoundError:
            os.unlink(tmp)  # ruff não instalado — ast.parse já passou, aceita
        return 200, {"valid": True}

    def _analyze_dependency_graph(params):
        import ast as _ast

        # Nós: todas as skills do catálogo
        nodes = list(_catalog.keys())

        # Arestas: parse do main.py buscando quais funções _INTERNAL chamam subprocess/urlopen
        edges = []
        src_path = os.path.join(os.path.dirname(__file__), "main.py")
        try:
            with open(src_path) as f:
                tree = _ast.parse(f.read())
            # Mapeia cada função interna para as calls que ela faz
            for node in _ast.walk(tree):
                if isinstance(node, _ast.FunctionDef) and node.name.startswith("_"):
                    skill_name = node.name.lstrip("_")
                    if skill_name in _catalog:
                        for child in _ast.walk(node):
                            if isinstance(child, _ast.Call):
                                if isinstance(child.func, _ast.Attribute):
                                    edges.append({"from": skill_name, "calls": child.func.attr})
        except Exception as e:
            edges = [{"error": str(e)}]

        # Arestas de segurança: regras do catálogo (upstream)
        policy = []
        for name, skill in _catalog.items():
            policy.append({
                "skill": name,
                "upstream": skill["upstream"],
                "requires_delegation": True
            })

        try:
            import networkx as nx
            G = nx.DiGraph()
            G.add_nodes_from(nodes)
            for e in edges:
                if "from" in e and "calls" in e:
                    G.add_edge(e["from"], e["calls"])
            cycles = list(nx.simple_cycles(G))
            return 200, {"nodes": list(G.nodes), "edges": list(G.edges), "cycles": cycles, "policy": policy}
        except ImportError:
            return 200, {"nodes": nodes, "edges": edges, "policy": policy, "note": "networkx not installed — install for cycle detection"}

    _INTERNAL["analyze_dependency_graph"] = _analyze_dependency_graph

    def _web_fetch(params):
        url = params.get("url", "")
        if not url:
            return 400, {"error": "url required"}
        try:
            import html.parser
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=15) as r:
                raw = r.read().decode(errors="replace")
            # strip tags para retornar texto legível
            class _S(html.parser.HTMLParser):
                def __init__(self): super().__init__(); self.parts = []; self._skip = False
                def handle_starttag(self, t, a): self._skip = t in ("script","style")
                def handle_endtag(self, t): self._skip = False
                def handle_data(self, d):
                    if not self._skip and d.strip(): self.parts.append(d.strip())
            p = _S(); p.feed(raw)
            text = "\n".join(p.parts)[:8000]
            return 200, {"url": url, "text": text}
        except Exception as e:
            return 500, {"error": str(e)}

    def _web_search(params):
        query = params.get("query", "")
        if not query:
            return 400, {"error": "query required"}
        try:
            import html.parser, urllib.parse, re
            url = "https://lite.duckduckgo.com/lite/?q=" + urllib.parse.quote_plus(query)
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=15) as r:
                raw = r.read().decode(errors="replace")
            results = []
            # extrai pares link + snippet da tabela do lite
            links    = re.findall(r'uddg=([^&"]+)', raw)
            titles   = re.findall(r"class='result-link'>(.*?)</a>", raw)
            snippets = re.findall(r"class='result-snippet'>(.*?)</span>", raw, re.S)
            for i in range(min(5, len(titles))):
                results.append({
                    "url":     urllib.parse.unquote(links[i]) if i < len(links) else "",
                    "title":   re.sub(r"<[^>]+>", "", titles[i]).strip(),
                    "snippet": re.sub(r"<[^>]+>", "", snippets[i]).strip() if i < len(snippets) else ""
                })
            return 200, {"query": query, "results": results}
        except Exception as e:
            return 500, {"error": str(e)}

    _INTERNAL["web_fetch"]  = _web_fetch
    _INTERNAL["web_search"] = _web_search

    def _git(params):
        cmd = params.get("command", "")
        if not cmd: return 400, {"error": "command required"}
        # bloqueia operações destrutivas
        blocked = ["push", "reset --hard", "clean -f", "branch -D"]
        if any(b in cmd for b in blocked):
            return 403, {"error": f"blocked: use execute_shell with explicit confirmation"}
        try:
            res = subprocess.run(f"git {cmd}", shell=True, capture_output=True,
                                 text=True, cwd=WORKSPACE, timeout=15)
            return 200, {"stdout": res.stdout, "stderr": res.stderr, "code": res.returncode}
        except Exception as e: return 500, {"error": str(e)}

    for _name, _fn in [("git",_git)]:
        _INTERNAL[_name] = _fn

    # --- memory e todo (estado em memória do processo) ---
    _MEMORY: dict = {}
    _TODOS:  list = []

    def _memory_set(params):
        k, v = params.get("key",""), params.get("value","")
        if not k: return 400, {"error": "key required"}
        _MEMORY[k] = v
        return 200, {"stored": k}

    def _memory_get(params):
        k = params.get("key","")
        if k == "*": return 200, {"memory": _MEMORY}
        if k not in _MEMORY: return 404, {"error": f"key '{k}' not found"}
        return 200, {"key": k, "value": _MEMORY[k]}

    def _todo_write(params):
        action = params.get("action", "list")
        task   = params.get("task", "")
        if action == "add":
            if not task: return 400, {"error": "task required"}
            _TODOS.append({"task": task, "done": False})
            return 200, {"todos": _TODOS}
        if action == "complete":
            for t in _TODOS:
                if t["task"] == task: t["done"] = True
            return 200, {"todos": _TODOS}
        if action == "clear":
            _TODOS.clear()
            return 200, {"todos": []}
        return 200, {"todos": _TODOS}  # list

    for _n, _f in [("memory_set",_memory_set),("memory_get",_memory_get),("todo_write",_todo_write)]:
        _INTERNAL[_n] = _f

    def _get_context(params):
        # 1. CONTEXT.md do repo (montado junto com main.py se disponível)
        for candidate in [
            os.path.join(os.path.dirname(__file__), "..", "..", "CONTEXT.md"),
            "/context/CONTEXT.md",
            os.path.join(WORKSPACE, "CONTEXT.md"),
        ]:
            path = os.path.normpath(candidate)
            if os.path.exists(path):
                with open(path) as f:
                    return 200, {"source": path, "content": f.read()}
        # fallback: resumo dinâmico
        return 200, {"project": "ludoc sovereign harness"}

    _INTERNAL["get_context"] = _get_context

    # --- executor genérico de skill ---
    def run_skill(name, params, caller=None):
        skill = _catalog.get(name)
        if not skill:
            return 404, {"error": f"skill '{name}' not found"}
        if skill["upstream"] == "internal_exec":
            return _INTERNAL[name](params)
        path = skill["upstream"]
        for k, v in params.items():
            path = path.replace(f"{{{k}}}", str(v))
        try:
            with urllib.request.urlopen(f"{PROXY}{path}", timeout=5) as r:
                return r.status, json.loads(r.read())
        except urllib.error.HTTPError as e:
            return e.code, {"error": str(e.reason)}

    # --- servidor HTTP ---
    class Handler(http.server.BaseHTTPRequestHandler):
        def log_message(self, *a): pass

        def send_json(self, code, data):
            body = json.dumps(data, ensure_ascii=False).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", len(body))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path == "/healthz":
                return self.send_json(200, {"status": "ok"})
            if self.path == "/skills":
                return self.send_json(200, list_skills())
            if self.path == "/tools":
                tools = [
                    {
                        "name": s["name"],
                        "description": s["description"],
                        "inputSchema": {
                            "type": "object",
                            "properties": {p: {"type": "string"} for p in s["params"]},
                            "required": s["params"]
                        },
                        "systemInstruction": s.get("system_instruction", "")
                    }
                    for s in _catalog.values()
                ]
                return self.send_json(200, {"schema": "mcp-tools/v1", "tools": tools})
            self.send_json(404, {"error": "not found"})

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            body   = json.loads(self.rfile.read(length)) if length else {}
            caller = self.headers.get("X-Delegation-Chain", "unknown")
            if caller == "unknown":
                return self.send_json(403, {"error": "missing X-Delegation-Chain — requests must pass through OBridge"})

            if self.path == "/run" or self.path == "/tools/call":
                skill_name = body.get("skill") if self.path == "/run" else body.get("name")
                params     = body.get("params", {}) if self.path == "/run" else body.get("arguments", {})
                if not skill_name: return self.send_json(400, {"error": "skill/name required"})
                code, result = run_skill(skill_name, params, caller)
                if self.path == "/tools/call":
                    return self.send_json(code, {"content": [{"type": "text", "text": json.dumps(result, ensure_ascii=False)}]})
                return self.send_json(code, {"caller": caller, "skill": skill_name, "result": result})

            if self.path == "/chat":
                import sys, os as _os
                sys.path.insert(0, _os.path.dirname(__file__))
                try:
                    import llm, cleaner
                except ImportError as e:
                    return self.send_json(503, {"error": f"llm/cleaner not available: {e}"})

                if not llm.available():
                    return self.send_json(503, {"error": "Ollama unreachable", "hint": f"start ollama at {llm.OLLAMA_HOST}"})

                prompt   = body.get("prompt", "")
                model    = body.get("model", llm.DEFAULT_MODEL)
                max_iter = int(body.get("max_iter", 10))
                if not prompt: return self.send_json(400, {"error": "prompt required"})

                semantic_mem = ""
                for fname in ["SKILL.md", "CONTEXT.md"]:
                    fpath = _os.path.join(_os.path.dirname(__file__), "..", "..", fname)
                    if _os.path.exists(fpath):
                        with open(fpath, "r", encoding="utf-8") as f:
                            semantic_mem += f"\n### {fname} (Semantic Memory):\n{f.read()}\n"
                
                episodic_mem = ""
                episodes_path = "/tmp/workspace/episodes.md"
                if _os.path.exists(episodes_path):
                    with open(episodes_path, "r", encoding="utf-8") as f:
                        episodic_mem = f"\n### Episodic Memory (Previous Lessons):\n{f.read()}\n"

                mem_context = semantic_mem + episodic_mem
                relevant  = cleaner.select(prompt, _catalog)
                tools_ctx = cleaner.format_for_llm(relevant)
                messages  = [{"role": "user", "content": prompt}]
                trace     = []
                last_call = None

                for i in range(max_iter):
                    decision = llm.call(llm.trim_history(messages), model=model, tools_context=tools_ctx + "\n" + mem_context)
                    trace.append({"iter": i+1, "decision": decision})
                    action = decision.get("action", "final_answer")
                    params = decision.get("params", {})

                    current_call = (action, json.dumps(params, sort_keys=True))
                    if current_call == last_call and action != "final_answer":
                        return self.send_json(200, {"caller": caller, "answer": f"Loop detectado na ferramenta '{action}'.", "iterations": i+1, "trace": trace, "loop_detected": True})
                    last_call = current_call

                    if action == "final_answer":
                        import threading
                        def _distill():
                            summary_prompt = f"Summarize this session in two lines: Task: {prompt} | Solution: {params.get('text','')}"
                            try:
                                res = llm.call([{"role": "user", "content": summary_prompt}], model=model)
                                text = res.get("params", {}).get("text", "")
                                if text: _distill_experience({"task": prompt[:100], "solution": text[:200]})
                            except: pass
                        threading.Thread(target=_distill).start()
                        return self.send_json(200, {"caller": caller, "answer": params.get("text",""), "iterations": i+1, "trace": trace})

                    if action in ["write_file", "fs_edit"]:
                        code_to_validate = ""
                        if action == "write_file":
                            filename = params.get("filename", "")
                            if filename.endswith(".py"): code_to_validate = params.get("content", "")
                        elif action == "fs_edit":
                            file_path = params.get("file_path", "")
                            if file_path.endswith(".py"): code_to_validate = params.get("new_string", "")
                        if code_to_validate:
                            val_code, val_res = _validate_code({"code": code_to_validate})
                            if not val_res.get("valid", True):
                                obs = {"skill": action, "result": {"error": f"CRITIC: Erro de sintaxe detectado. Detalhes: {val_res.get('error')}"}}
                                messages.append({"role": "assistant", "content": json.dumps(decision)})
                                messages.append({"role": "user", "content": f"Observation: {json.dumps(obs)}"})
                                continue

                    code, result = run_skill(action, params, caller)
                    obs = {"skill": action, "result": result}
                    messages.append({"role": "assistant", "content": json.dumps(decision)})
                    messages.append({"role": "user", "content": f"Observation: {json.dumps(obs)}"})

                return self.send_json(200, {"caller": caller, "answer": "max iterations reached", "iterations": max_iter, "trace": trace})

    if __name__ == "__main__":
        server = http.server.HTTPServer(("0.0.0.0", 8080), Handler)
        server.serve_forever()

  skill_execute_shell.md: |
    ---
    name: execute_shell
    description: Executa comando shell no sandbox /tmp/workspace
    params: [command]
    upstream: internal_exec
    ---
    # execute_shell
    Use apenas para comandos de leitura e execução de código dentro do sandbox. 
    Nunca execute comandos destrutivos (rm -rf, dd, mkfs) ou que modifiquem configurações do sistema.
    Comandos bloqueados (requerem HITL): rm, push, kill, wget, curl, apt, sh, bash.
    Se precisar ler arquivos, use `cat`, `grep`, `find`, `ls`.

  skill_write_file.md: |
    ---
    name: write_file
    description: Cria ou sobrescreve arquivo em /tmp/workspace
    params: [filename, content]
    upstream: internal_exec
    ---
    # write_file
    O caminho é relativo ao workspace — não use ../ ou caminhos absolutos.
    Sempre será validado automaticamente pelo Critic antes da gravação.
    Se houver erro de sintaxe Python, o arquivo não será gravado e você receberá o erro.

  skill_fs_edit.md: |
    ---
    name: fs_edit
    description: Edição atômica de arquivo por substituição exata de string (requer unicidade)
    params: [file_path, old_string, new_string]
    upstream: internal_exec
    ---
    # fs_edit
    Use para modificações cirúrgicas em arquivos existentes. 
    old_string deve ser única no arquivo — inclua 3-4 linhas de contexto ao redor. 
    Sempre chame `cat` via `execute_shell` antes para verificar o conteúdo exato. 
    Se retornar erro de count>1, expanda o old_string. 
    Se count=0, verifique espaços e indentação exatos.
    Sempre será validado automaticamente pelo Critic antes da gravação se for arquivo Python.

  skill_validate_code.md: |
    ---
    name: validate_code
    description: Valida sintaxe Python via ast.parse e ruff (se disponível)
    params: [code]
    upstream: internal_exec
    ---
    # validate_code
    Esta skill é chamada automaticamente pelo sistema durante write_file e fs_edit.
    Você também pode chamá-la manualmente para validar blocos de código antes de tentar gravar.
    Só prossiga se result.valid for true.

  skill_analyze_dependency_graph.md: |
    ---
    name: analyze_dependency_graph
    description: Retorna grafo de dependências das skills (nós, arestas, policy)
    params: []
    upstream: internal_exec
    ---
    # analyze_dependency_graph
    Use antes de refatorar qualquer skill para entender o impacto. 
    Verifique cycles antes de criar novas dependências entre skills.

  skill_web_search.md: |
    ---
    name: web_search
    description: Pesquisa na web via DuckDuckGo e retorna lista de resultados
    params: [query]
    upstream: internal_exec
    ---
    # web_search
    Use para descobrir informações externas antes de tomar decisões. 
    Prefira queries concisas em inglês para melhores resultados.

  skill_web_fetch.md: |
    ---
    name: web_fetch
    description: Busca e retorna o conteúdo de uma URL (texto/HTML)
    params: [url]
    upstream: internal_exec
    ---
    # web_fetch
    Use para ler documentação, páginas web ou APIs públicas. 
    Retorna o texto bruto — parse conforme necessário.

  skill_distill_experience.md: |
    ---
    name: distill_experience
    description: Extrai um sumário conciso da tarefa e solução para memória episódica
    params: [task, solution]
    upstream: internal_exec
    ---
    # distill_experience
    Esta skill é chamada automaticamente ao final de uma sessão bem-sucedida.
    Gera um registro no formato: "Tarefa: <Intenção> | Solução: <O que foi consertado e as lições aprendidas>".
    O resultado é apensado ao arquivo `/tmp/workspace/episodes.md`.

  skill_get_patient.md: |
    ---
    name: get_patient
    description: Busca registro de paciente por ID
    params: [patient_id]
    upstream: /patients/{patient_id}
    ---
    # get_patient
    Use esta skill para recuperar dados de um único paciente. Passe apenas o ID numérico. Nunca infira IDs — solicite ao usuário se necessário.

  skill_list_patients.md: |
    ---
    name: list_patients
    description: Lista todos os pacientes
    params: []
    upstream: /patients
    ---
    # list_patients
    Use esta skill para obter a lista completa de pacientes. Não aceita filtros — para busca específica use get_patient.

  skill_memory_set.md: |
    ---
    name: memory_set
    description: Armazena um valor K/V na memória persistente do agente (dura enquanto o pod viver)
    params: [key, value]
    upstream: internal_exec
    ---
    # memory_set
    Use para salvar fatos importantes entre chamadas: planos, resultados intermediários, decisões tomadas. 
    Prefira chaves descritivas como 'plano_atual' ou 'ultimo_arquivo_editado'.

  skill_memory_get.md: |
    ---
    name: memory_get
    description: Recupera um valor da memória pelo key (ou lista todas as keys se key=*)
    params: [key]
    upstream: internal_exec
    ---
    # memory_get
    Use no início de uma tarefa para recuperar contexto anterior. 
    Use key='*' para listar todas as entradas disponíveis.

  skill_todo_write.md: |
    ---
    name: todo_write
    description: Gerencia lista de tarefas do agente (action: add|complete|list|clear)
    params: [action, task]
    upstream: internal_exec
    ---
    # todo_write
    Use para decompor tarefas complexas. 
    Antes de executar um plano multi-step: add cada passo. 
    Marque complete após cada execução bem-sucedida. 
    Use list para verificar o que falta.

  skill_get_context.md: |
    ---
    name: get_context
    description: Retorna o estado atual do projeto: skills, endpoints, próximos passos e como continuar
    params: []
    upstream: internal_exec
    ---
    # get_context
    SEMPRE chame esta skill primeiro ao iniciar uma nova sessão. 
    Ela contém o estado completo do projeto, skills disponíveis e o que falta fazer.

  skill_git.md: |
    ---
    name: git
    description: Executa comando git no workspace (status, diff, log, add, commit)
    params: [command]
    upstream: internal_exec
    ---
    # git
    Use apenas comandos não-destrutivos por padrão (status, diff, log, show). 
    Para add/commit, confirme com o usuário antes. 
    Nunca execute push ou reset --hard sem instrução explícita.
